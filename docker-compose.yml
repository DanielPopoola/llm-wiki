services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: llm-wiki-db

    ports:
      - "1521:1521"

    environment:
      - ORACLE_PWD=${ORACLE_PASSWORD}

    volumes:
      - oracle-data:/opt/oracle/oradata

    restart: unless-stopped

volumes:
  oracle-data: